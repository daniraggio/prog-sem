name: Procesar Programación Semanal CAMMESA

# Se dispara al subir/modificar un .mdb en data/, un .pdf en informes/, o cambios
# en los scripts; también se puede correr a mano desde la pestaña Actions.
on:
  push:
    branches: [main]
    paths:
      - "data/**.mdb"
      - "data/**.MDB"
      - "informes/**.pdf"
      - "informes/**.PDF"
      - "redespaches/**.xls"
      - "redespaches/**.XLS"
      - "redespaches/**.xlsx"
      - "scripts/**"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  procesar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar mdbtools
        run: sudo apt-get update && sudo apt-get install -y mdbtools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: ETL .mdb -> historico.json
        id: etl
        continue-on-error: true
        run: python3 scripts/etl_to_json.py

      - name: Mostrar resumen de errores de .mdb (si los hubo)
        if: steps.etl.outcome == 'failure'
        run: |
          echo "## ⚠️ Algunos archivos .mdb no se pudieron procesar" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 scripts/print_etl_summary.py >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Las semanas que SÍ se procesaron bien igual se van a publicar. Revisá el detalle de arriba (o processed/etl_errors.json en el repo) para los archivos que fallaron." >> $GITHUB_STEP_SUMMARY

      - name: Análisis comparativo -> analisis.json
        run: python3 scripts/analisis.py

      - name: Parsear informes PDF -> informes.json
        id: informes
        continue-on-error: true
        run: python3 scripts/parse_informes.py

      - name: Mostrar resumen de errores de informes (si los hubo)
        if: steps.informes.outcome == 'failure'
        run: |
          echo "## ⚠️ Algún informe PDF no se pudo procesar" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Revisá processed/informes_errors.json en el repo para el detalle (traceback completo)." >> $GITHUB_STEP_SUMMARY

      - name: Parsear redespacho XLS -> redespaches.json + comparacion_redespacho.json
        id: redespacho
        continue-on-error: true
        run: python3 scripts/parse_redespacho.py

      - name: Mostrar resumen de errores de redespacho (si los hubo)
        if: steps.redespacho.outcome == 'failure'
        run: |
          echo "## ⚠️ Algún redespacho XLS no se pudo procesar" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Revisá processed/redespacho_errors.json en el repo para el detalle." >> $GITHUB_STEP_SUMMARY

      - name: Commit y push de los JSON generados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A processed/
          git diff --staged --quiet || git commit -m "Actualiza análisis semanal e informes CAMMESA [auto]"
          git push

      - name: Fallar el job si hubo errores (para que quede marcado en rojo)
        if: steps.etl.outcome == 'failure' || steps.informes.outcome == 'failure' || steps.redespacho.outcome == 'failure'
        run: exit 1
