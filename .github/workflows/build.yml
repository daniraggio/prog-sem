name: Actualización automática CAMMESA

# Cuándo corre:
#   - Todos los días a las 08:00 UTC = 05:00 Argentina (UTC-3)
#   - Al subir archivos manualmente a data/, redespaches/, informes/ o cambios en scripts/
#   - Manualmente desde la pestaña Actions ("Run workflow")
on:
  schedule:
    - cron: "0 8 * * *"
  push:
    branches: [main]
    paths:
      - "data/**.mdb"
      - "data/**.MDB"
      - "redespaches/**.xls"
      - "redespaches/**.XLS"
      - "redespaches/**.xlsx"
      - "informes/**.pdf"
      - "informes/**.PDF"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      diagnostico:
        description: "Correr solo diagnóstico de la API (sin actualizar datos)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  # ── Job de diagnóstico (solo cuando se pide explícitamente) ──────────────────
  diagnostico:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.diagnostico == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Diagnóstico API CAMMESA
        run: python3 scripts/diagnostico_api.py

  # ── Job principal ─────────────────────────────────────────────────────────────
  actualizar:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.diagnostico != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar mdbtools
        run: sudo apt-get update && sudo apt-get install -y mdbtools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      # ── PASO 1: Intentar descargar archivos nuevos desde la API ──────────────
      - name: Descargar documentos nuevos desde API CAMMESA
        id: download
        run: python3 scripts/download_cammesa.py

      # ── PASO 2: Procesar solo si hay archivos nuevos O si el push fue manual ──
      # La condición siempre es true en push manual (ya que se pusharon archivos
      # o cambios de scripts). En el cron diario, solo si downloaded=true.
      - name: ETL .mdb -> historico.json
        id: etl
        continue-on-error: true
        run: python3 scripts/etl_to_json.py

      - name: Mostrar resumen de errores de .mdb (si los hubo)
        if: steps.etl.outcome == 'failure'
        run: |
          echo "## ⚠️ Algunos archivos .mdb no se pudieron procesar" >> $GITHUB_STEP_SUMMARY
          python3 scripts/print_etl_summary.py >> $GITHUB_STEP_SUMMARY

      - name: Análisis comparativo -> analisis.json
        if: steps.etl.outcome == 'success'
        run: python3 scripts/analisis.py

      - name: Parsear redespacho XLS -> redespaches.json + comparacion_redespacho.json
        id: redespacho
        continue-on-error: true
        run: python3 scripts/parse_redespacho.py

      - name: Verificar comparacion_redespacho.json
        if: always()
        run: |
          python3 scripts/check_redespacho.py
          echo "--- redespaches/ ---"
          ls redespaches/ 2>/dev/null || echo "(vacío)"

      - name: Parsear informes PDF -> informes.json
        id: informes
        if: steps.download.outputs.downloaded == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python3 scripts/parse_informes.py

      # ── PASO 3: Commit y push de todo lo generado ────────────────────────────
      - name: Resumen en GitHub Actions
        if: always()
        run: |
          echo "## Resultado de la corrida" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Paso | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Descarga API CAMMESA | Archivos nuevos: **${{ steps.download.outputs.count || '0' }}** (${{ steps.download.outputs.files || 'ninguno' }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| ETL .mdb | ${{ steps.etl.outcome || 'omitido' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Redespacho XLS | ${{ steps.redespacho.outcome || 'omitido' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Informes PDF | ${{ steps.informes.outcome || 'omitido' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Commit y push de los archivos nuevos y JSONs generados
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/ redespaches/ informes/ processed/
          git diff --staged --quiet || git commit -m "Auto: actualiza datos CAMMESA — ${{ steps.download.outputs.files || 'sin archivos nuevos' }} [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Enviar reporte por email
        if: steps.download.outputs.downloaded == 'true'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NUEVOS_ARCHIVOS: ${{ steps.download.outputs.files }}
          EMAIL_FROM: jarvis.aconcagua@gmail.com
          EMAIL_TO: ${{ secrets.EMAIL_TO || 'draggio@aconcaguaenergia.com' }}
        run: python3 scripts/send_email.py

      - name: Fallar el job si hubo errores en el ETL
        if: steps.etl.outcome == 'failure'
        run: exit 1
